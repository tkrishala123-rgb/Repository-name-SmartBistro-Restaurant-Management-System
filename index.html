<!DOCTYPE html>
<html>
<head>
  <title>SmartBistro Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>SmartBistro</h1>
    <p>Restaurant Management System</p>
  </header>

  <section>
    <h2>Customer Menu</h2>
    <div class="card">Chicken Burger - $12.50 <button>Order</button></div>
    <div class="card">Veg Pizza - $15.00 <button>Order</button></div>
    <div class="card">Pasta - $14.00 <button>Order</button></div>
  </section>

  <section>
    <h2>Kitchen Display</h2>
    <p>Order #101: Preparing</p>
    <p>Estimated Time: 15 minutes</p>
  </section>

  <section>
    <h2>Manager Dashboard</h2>
    <p>Today's Sales: $1,250</p>
    <p>Orders Completed: 42</p>
    <p>Low Stock Alerts: 3</p>
  </section>
</body>
</html>
